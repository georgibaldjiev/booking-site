<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <title>Запази час</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      font-size: 16px;
    }

    #slots button {
      margin: 5px 0;
      background: #f3f3f3;
      border: 1px solid #ccc;
      cursor: pointer;
    }

    #slots button.selected {
      background: lightgreen;
    }
  </style>
</head>

<body>

<h2>Запази консултация</h2>

<select id="type">
  <option value="online">Онлайн (Google Meet)</option>
  <option value="offline">На място</option>
</select>

<input id="name" placeholder="Име">
<input id="email" placeholder="Email">

<h3>Свободни часове:</h3>
<div id="slots">Зареждане...</div>

<button onclick="book()">Запази</button>

<script>
let selectedSlot = null;

async function loadSlots() {
  const res = await fetch("/.netlify/functions/calendar", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({

  const busy = await res.json();

  const container = document.getElementById("slots");
  container.innerHTML = "";

  const now = new Date();

  for (let d = 0; d < 7; d++) {
    for (let h = 9; h <= 17; h++) {

      let slot = new Date();
      slot.setDate(now.getDate() + d);
      slot.setHours(h, 0, 0, 0);

      let iso = slot.toISOString();

      // проверка дали е зает
      let isBusy = busy.some(b => {
        return b.start === iso;
      });

      if (!isBusy) {
        let btn = document.createElement("button");

        btn.innerText = slot.toLocaleString("bg-BG");

        btn.onclick = () => {
          selectedSlot = iso;

          document.querySelectorAll("#slots button")
            .forEach(b => b.classList.remove("selected"));

          btn.classList.add("selected");
        };

        container.appendChild(btn);
      }
    }
  }
}

async function book() {
  if (!selectedSlot) {
    alert("Избери час");
    return;
  }

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const type = document.getElementById("type").value;

  const res = await fetch("/.netlify/functions/calendar", {
    method: "POST",
    body: JSON.stringify({
      action: "create",
      name,
      email,
      slot: selectedSlot,
      type
    })
  });

  const data = await res.json();

  alert("Часът е запазен!");
  loadSlots();
}

loadSlots();
</script>

</body>
</html>
